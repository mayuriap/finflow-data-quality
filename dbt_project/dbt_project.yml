name: 'finflow'
version: '1.0.0'
config-version: 2

profile: 'finflow'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  finflow:
    bronze:
      +schema: bronze
      +materialized: view
      +tags: ["bronze"]
    silver:
      +schema: silver
      +materialized: incremental
      +tags: ["silver"]
    gold:
      +schema: gold
      +materialized: table
      +tags: ["gold"]
      
dispatch:
  - macro_namespace: dbt
    search_order: ['finflow', 'dbt']